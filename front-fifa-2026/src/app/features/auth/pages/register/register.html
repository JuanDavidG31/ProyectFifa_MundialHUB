<div class="register-wrapper">
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="register-glass-card">

    <div class="card-header">
      <div class="logo-container">
        <img src="assets/mundial.png" alt="Logo MundialHub" class="icon-pulse logo-image">
        <h1>Mundial<span class="gradient-text">Hub</span></h1>
      </div>
      <p class="subtitle">¡Crea tu cuenta y empieza tu colección!</p>
    </div>

    <form (ngSubmit)="crearCuenta()" #registerForm="ngForm" class="register-form">
      <div class="form-grid">

        <div class="input-group">
          <input name="name" [(ngModel)]="registerData.name" required type="text" placeholder="Nombre completo"
            pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+">
        </div>

        <div class="input-group">
          <input name="personalId" [(ngModel)]="registerData.personalId" required type="text" placeholder="Cédula o ID"
            pattern="\d{10}" maxlength="10">
        </div>

        <div class="input-group">
          <input name="user" [(ngModel)]="registerData.user" required type="text" placeholder="Nombre de usuario"
            pattern="[a-zA-Z0-9]+">
        </div>

        <div class="input-group">
          <input name="email" [(ngModel)]="registerData.email" required type="email" placeholder="correo@ejemplo.com"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$">
        </div>

        <div class="input-group">
          <select name="country" [(ngModel)]="registerData.coutry" required class="select-country">
            <option value="" disabled selected>Selecciona tu país</option>
            <option *ngFor="let p of countries" [value]="p">{{ p }}</option>
          </select>
        </div>

        <div class="password-container">
          <div class="input-group">
            <input name="password" [(ngModel)]="registerData.password" (input)="onPasswordChange()" required
              [type]="showPassword ? 'text' : 'password'" placeholder="Contraseña secreta">
            <button type="button" class="btn-eye" (click)="togglePassword()">
              {{ showPassword ? 'ꗃ' : '🔒︎' }}
            </button>
          </div>

          <div class="strength-meter" *ngIf="registerData.password">
            <div class="bar-background">
              <div class="bar-fill" [style.width.%]="passwordStrength * 25" [attr.data-strength]="passwordStrength">
              </div>
            </div>
            <span class="strength-text">{{ passwordFeedback }}</span>
          </div>
        </div>

      </div>

      <label class="file-upload-container">
        <input type="file" (change)="onImageSelected($event)" accept="image/*">
        <div class="file-info">
          <span class="icon">📸</span>
          <span>{{ imagen ? imagen.name : 'Haz clic para subir tu foto de perfil' }}</span>
        </div>
      </label>

      <div *ngIf="registrationError" class="alert-box error">
        <span class="alert-icon">⚠️</span>
        <p>{{ registrationError }}</p>
      </div>

      <div *ngIf="registrationSuccess" class="alert-box success">
        <span class="alert-icon">✅</span>
        <p>{{ registrationSuccess }}</p>
      </div>

      <button type="submit" class="btn-play" [disabled]="registerForm.invalid || isLoading || passwordStrength < 4">
        <span *ngIf="!isLoading" class="btn-text">¡REGISTRARME AHORA!</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="card-footer">
      <p>¿Ya tienes tu pase oficial? <a routerLink="/login">Inicia sesión</a></p>
    </div>

  </div>
</div>
