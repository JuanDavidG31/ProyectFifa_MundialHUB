<div class="login-wrapper">
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="login-glass-card">

    <div class="card-header">
      <div class="logo-container">
        <h1>Recuperar<span class="gradient-text">Acceso</span></h1>
      </div>
      <p class="subtitle" *ngIf="step === 1">Te enviaremos un código de seguridad a tu correo electrónico.</p>
      <p class="subtitle" *ngIf="step === 2">Ingresa el código de 6 dígitos que enviamos a <strong>{{ email }}</strong>.
      </p>
      <p class="subtitle" *ngIf="step === 3">Crea tu nueva contraseña para volver a la cancha.</p>
    </div>

    <div *ngIf="errorMsg" class="alert-box error">
      <span class="alert-icon">!</span>
      <p>{{ errorMsg }}</p>
    </div>
    <div *ngIf="successMsg" class="alert-box success">
      <span class="alert-icon">✓</span>
      <p>{{ successMsg }}</p>
    </div>

    <form *ngIf="step === 1" (ngSubmit)="sendCode()" #emailForm="ngForm" class="login-form fade-in">
      <div class="input-group">
        <span class="input-icon">➤</span>
        <input name="email" [(ngModel)]="email" required type="email" placeholder="correo@ejemplo.com">
      </div>
      <button type="submit" class="btn-play" [disabled]="emailForm.invalid || isLoading">
        <span *ngIf="!isLoading">ENVIAR CÓDIGO</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <form *ngIf="step === 2" (ngSubmit)="verifyCode()" #codeForm="ngForm" class="login-form fade-in">
      <div class="input-group code-group">
        <input name="code" [(ngModel)]="verificationCode" required type="text" placeholder="Ej: 123456" maxlength="6">
      </div>
      <button type="submit" class="btn-play" [disabled]="codeForm.invalid">
        <span>VERIFICAR CÓDIGO</span>
      </button>
    </form>

    <form *ngIf="step === 3" (ngSubmit)="resetPassword()" #passForm="ngForm" class="login-form fade-in">
      <div class="input-group">
        <input name="password" [(ngModel)]="newPassword" required [type]="showPassword ? 'text' : 'password'"
          placeholder="Nueva contraseña" (input)="checkPasswordStrength()">
        <button type="button" class="btn-eye" (click)="togglePassword()">
          {{ showPassword ? 'ꗃ' : '🔒︎' }}
        </button>
      </div>

      <div class="strength-meter" *ngIf="newPassword">
        <div class="bar-background">
          <div class="bar-fill" [style.width.%]="passwordStrength * 25" [attr.data-strength]="passwordStrength"></div>
        </div>
        <span class="strength-text">{{ passwordFeedback }}</span>
      </div>

      <button type="submit" class="btn-play" [disabled]="passForm.invalid || isLoading || passwordStrength < 4">
        <span *ngIf="!isLoading">ACTUALIZAR Y ENTRAR</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="footer-links">
      <a routerLink="/login" class="link">Volver al Login</a>
    </div>

  </div>
</div>
