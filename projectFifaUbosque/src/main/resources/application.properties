# ==========================================
#  SERVER
# ==========================================
server.port=${PORT:8080}
spring.application.name=fifaProyect2026
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:4200}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

# ==========================================
#  BASE DE DATOS
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
#  JAVA MAIL (Gmail)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
#  CLOUDINARY
# ==========================================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ==========================================
#  STRIPE
# ==========================================
stripe.api.key=${STRIPE_API_KEY}

# ==========================================
#  APIS EXTERNAS
# ==========================================
serpapi.api.key=${SERPAPI_KEY}
api.football.key=${API_FOOTBALL_KEY}
football.api.key=${FOOTBALL_API_KEY}

# ==========================================
#  JWT
# ==========================================
project.jwt.secret=${JWT_SECRET}
project.jwt.expiration=86400000

# ==========================================
#  ARCHIVOS MULTIPART
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
#  SWAGGER / SPRINGDOC
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html